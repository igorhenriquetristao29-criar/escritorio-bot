<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Atendimento</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }

        /* ── LOGIN ── */
        #tela-login {
            position: fixed; inset: 0; background: #1a1a2e;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box {
            background: white; border-radius: 16px; padding: 40px 36px; width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); text-align: center;
        }
        .login-box h2 { color: #1a1a2e; margin-bottom: 6px; font-size: 22px; }
        .login-box p { color: #888; font-size: 13px; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 15px; margin-bottom: 14px; outline: none;
        }
        .login-box input:focus { border-color: #007bff; }
        .login-box button {
            width: 100%; padding: 12px; background: #007bff; color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: bold;
            cursor: pointer;
        }
        .login-box button:hover { background: #0056b3; }
        .login-erro { color: #dc3545; font-size: 13px; margin-top: 10px; display: none; }

        /* ── CABEÇALHO ── */
        header {
            background: #1a1a2e; color: white; padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 20px; }
        .header-links { display: flex; gap: 12px; align-items: center; }
        .header-links a {
            color: #adb5bd; text-decoration: none; font-size: 13px;
            padding: 6px 12px; border-radius: 6px; border: 1px solid #495057;
        }
        .header-links a:hover { background: #343a40; color: white; }
        .btn-sair {
            background: none; border: 1px solid #dc3545; color: #dc3545;
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn-sair:hover { background: #dc3545; color: white; }

        /* ── CONTEÚDO ── */
        main { padding: 20px; max-width: 800px; margin: 0 auto; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .btn-atualizar {
            padding: 10px 20px; background: #007bff; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;
        }
        .btn-atualizar:hover { background: #0056b3; }
        .contador { color: #666; font-size: 14px; }

        /* ── CARDS ── */
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card.fora-area { border-left: 4px solid #007bff; }
        .card.nossa-area { border-left: 4px solid #28a745; }
        .cliente-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .foto { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .foto-placeholder { width: 48px; height: 48px; border-radius: 50%; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .cliente-nome { font-size: 18px; font-weight: bold; color: #333; }
        .cliente-tel { font-size: 13px; color: #888; }
        .mensagem-original { background: #f0f2f5; padding: 10px; border-radius: 8px; margin-bottom: 12px; color: #555; font-style: italic; }
        .badges { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .alta { background: #ffe0e0; color: #c0392b; }
        .media { background: #fff3cd; color: #856404; }
        .baixa { background: #d4edda; color: #155724; }
        .bpc_loas { background: #cce5ff; color: #004085; }
        .inventario { background: #e2d9f3; color: #4a235a; }
        .licitacoes { background: #ffeeba; color: #856404; }
        .fora_da_area { background: #cce5ff; color: #004085; }
        .geral { background: #e2e3e5; color: #383d41; }
        .aviso-fora-area { background: #e8f4fd; border: 1px solid #007bff; border-radius: 8px; padding: 10px; margin-bottom: 12px; color: #004085; font-size: 13px; }
        .resposta-label { font-weight: bold; color: #333; margin-bottom: 6px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; min-height: 100px; resize: vertical; margin-bottom: 12px; }
        .botoes { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-aprovar { background: #28a745; color: white; }
        .btn-aprovar:hover { background: #218838; }
        .btn-rejeitar { background: #dc3545; color: white; }
        .btn-rejeitar:hover { background: #c82333; }
        .btn-opcao { background: #f8f9fa; border: 1px solid #ddd; color: #333; text-align: left; width: 100%; margin-bottom: 8px; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: normal; }
        .btn-opcao:hover { background: #e9ecef; border-color: #28a745; }
        .feedback-area { margin-top: 12px; display: none; }
        .feedback-area textarea { min-height: 60px; margin-bottom: 8px; }
        .feedback-label { font-size: 13px; color: #666; margin-bottom: 6px; }
        .opcoes-area { margin-top: 12px; display: none; }
        .opcoes-label { font-weight: bold; color: #333; margin-bottom: 8px; }
        .enviado { opacity: 0.5; pointer-events: none; }
        .tag-enviado { background: #28a745; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .vazio { text-align: center; color: #888; padding: 60px; font-size: 18px; }
    </style>
</head>
<body>

<!-- ── TELA DE LOGIN ── -->
<div id="tela-login">
    <div class="login-box">
        <h2>Painel de Atendimento</h2>
        <p>Letícia Marques Advocacia</p>
        <input type="password" id="campo-senha" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') entrar()">
        <button onclick="entrar()">Entrar</button>
        <div class="login-erro" id="erro-login">Senha incorreta. Tente novamente.</div>
    </div>
</div>

<!-- ── CABEÇALHO ── -->
<header>
    <h1>Painel de Atendimento</h1>
    <div class="header-links">
        <a href="/relatorios">Relatórios</a>
        <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
</header>

<!-- ── CONTEÚDO ── -->
<main>
    <div class="toolbar">
        <button class="btn-atualizar" onclick="carregar()">Atualizar mensagens</button>
        <span class="contador" id="contador"></span>
    </div>
    <div id="mensagens"></div>
</main>

<script>
    const API = 'https://web-production-444ef9.up.railway.app';
    let operacaoEmAndamento = false;

    // ── AUTENTICAÇÃO ──────────────────────────────────────────────────────────

    function verificarLogin() {
        if (localStorage.getItem('painel_logado') === '1') {
            document.getElementById('tela-login').style.display = 'none';
        }
    }

    async function entrar() {
        const senha = document.getElementById('campo-senha').value;
        const erroEl = document.getElementById('erro-login');
        erroEl.style.display = 'none';

        try {
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({senha})
            });
            if (res.ok) {
                localStorage.setItem('painel_logado', '1');
                document.getElementById('tela-login').style.display = 'none';
                carregar();
            } else {
                erroEl.style.display = 'block';
                document.getElementById('campo-senha').value = '';
                document.getElementById('campo-senha').focus();
            }
        } catch (e) {
            erroEl.textContent = 'Erro de conexão. Tente novamente.';
            erroEl.style.display = 'block';
        }
    }

    function sair() {
        localStorage.removeItem('painel_logado');
        location.reload();
    }

    // ── MENSAGENS ─────────────────────────────────────────────────────────────

    async function carregar() {
        const res = await fetch(`${API}/pendentes`);
        const dados = await res.json();
        const container = document.getElementById('mensagens');
        const contador = document.getElementById('contador');

        const pendentes = dados.filter(m => m.status !== 'enviado');
        contador.textContent = pendentes.length > 0
            ? `${pendentes.length} mensagem(ns) aguardando`
            : 'Nenhuma pendente';

        if (dados.length === 0) {
            container.innerHTML = '<div class="vazio">Nenhuma mensagem pendente</div>';
            return;
        }

        container.innerHTML = dados.map(m => {
            const inicial = (m.nome || '?')[0].toUpperCase();
            const fotoHtml = m.foto
                ? `<img class="foto" src="${m.foto}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="foto-placeholder" style="display:none">${inicial}</div>`
                : `<div class="foto-placeholder">${inicial}</div>`;

            const categoria = m.analise.categoria || 'cliente_nossa_area';
            const foraArea = categoria === 'cliente_fora_area';
            const cardClass = foraArea ? 'fora-area' : 'nossa-area';

            const avisoForaArea = foraArea ? `
                <div class="aviso-fora-area">
                    Fora da nossa área — Considere indicar um colega advogado especialista.
                </div>` : '';

            const mid = m.id || m.telefone;
            return `
            <div class="card ${cardClass}" id="card-${mid}">
                <div class="cliente-info">
                    ${fotoHtml}
                    <div>
                        <div class="cliente-nome">${m.nome || 'Desconhecido'}</div>
                        <div class="cliente-tel">${m.telefone}</div>
                    </div>
                </div>
                <div class="mensagem-original">"${m.mensagem_original}"</div>
                <div class="badges">
                    <span class="badge ${categoria}">${foraArea ? 'FORA DA ÁREA' : 'NOSSA ÁREA'}</span>
                    <span class="badge ${m.analise.urgencia}">${(m.analise.urgencia || '').toUpperCase()}</span>
                    <span class="badge ${m.analise.area}">${(m.analise.area || '').replace(/_/g, ' ').toUpperCase()}</span>
                </div>
                ${avisoForaArea}
                <div class="resposta-label">Resposta sugerida:</div>
                <textarea id="texto-${mid}">${m.analise.resposta || ''}</textarea>
                <div class="botoes">
                    <button class="btn-aprovar" onclick="aprovar('${mid}', '${(m.nome||'cliente').replace(/'/g,'')}')">Aprovar e Enviar</button>
                    <button class="btn-rejeitar" onclick="mostrarFeedback('${mid}')">Rejeitar</button>
                </div>

                <div class="feedback-area" id="feedback-${mid}">
                    <div class="feedback-label">O que estava errado? Dê uma sugestão para o Claude gerar novas opções:</div>
                    <textarea id="feedback-texto-${mid}" placeholder="Ex: Tom muito formal, quero mais direto ao ponto..."></textarea>
                    <button class="btn-aprovar" onclick="pedirNovasOpcoes('${mid}')" style="background:#6c757d">Gerar novas opções</button>
                </div>

                <div class="opcoes-area" id="opcoes-${mid}">
                    <div class="opcoes-label">Escolha uma das opções geradas pelo Claude:</div>
                    <div id="lista-opcoes-${mid}"></div>
                </div>
            </div>`;
        }).join('');
    }

    function mostrarFeedback(telefone) {
        document.getElementById(`feedback-${telefone}`).style.display = 'block';
    }

    async function pedirNovasOpcoes(telefone) {
        const feedback = document.getElementById(`feedback-texto-${telefone}`).value;
        const btn = event.target;
        btn.textContent = 'Gerando opções...';
        btn.disabled = true;
        operacaoEmAndamento = true;

        try {
            const res = await fetch(`${API}/rejeitar/${telefone}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({feedback})
            });
            const data = await res.json();

            if (data.erro) {
                alert('Erro: ' + data.erro);
                return;
            }

            const opcoes = data.analise.opcoes || [data.analise.resposta];
            const listaEl = document.getElementById(`lista-opcoes-${telefone}`);
            const opcoesEl = document.getElementById(`opcoes-${telefone}`);

            listaEl.innerHTML = opcoes.map((op, i) => `
                <button class="btn-opcao" onclick="selecionarOpcao('${telefone}', this)">
                    <strong>Opção ${i+1}:</strong> ${op}
                </button>
            `).join('');

            opcoesEl.style.display = 'block';
            document.getElementById(`feedback-${telefone}`).style.display = 'none';
        } catch (e) {
            alert('Erro de conexão. Tente novamente.');
        } finally {
            btn.textContent = 'Gerar novas opções';
            btn.disabled = false;
            operacaoEmAndamento = false;
        }
    }

    function selecionarOpcao(telefone, btn) {
        const texto = btn.innerText.replace(/^Opção \d+:\s*/, '');
        document.getElementById(`texto-${telefone}`).value = texto;
        document.getElementById(`opcoes-${telefone}`).style.display = 'none';
    }

    async function aprovar(id, nome) {
        const mensagem = document.getElementById(`texto-${id}`).value;
        if (!confirm(`Enviar esta mensagem para ${nome}?\n\n"${mensagem}"`)) return;

        try {
            const res = await fetch(`${API}/aprovar/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensagem})
            });
            if (res.ok) {
                const card = document.getElementById(`card-${id}`);
                if (card) card.remove();
                const pendentes = document.querySelectorAll('.card').length;
                document.getElementById('contador').textContent =
                    pendentes > 0 ? `${pendentes} mensagem(ns) aguardando` : 'Nenhuma pendente';
                if (pendentes === 0) {
                    document.getElementById('mensagens').innerHTML = '<div class="vazio">Nenhuma mensagem pendente</div>';
                }
            } else {
                alert('Erro ao enviar. Tente novamente.');
            }
        } catch (e) {
            alert('Erro de conexão. Tente novamente.');
        }
    }

    // ── INICIALIZAÇÃO ─────────────────────────────────────────────────────────
    verificarLogin();
    if (localStorage.getItem('painel_logado') === '1') carregar();

    function temDigitacaoAtiva() {
        // Não atualiza se houver operação em andamento ou usuário digitando
        if (operacaoEmAndamento) return true;
        const campos = document.querySelectorAll('textarea');
        for (const campo of campos) {
            if (document.activeElement === campo || campo.value.trim() !== '') return true;
        }
        return false;
    }

    setInterval(() => {
        if (localStorage.getItem('painel_logado') === '1' && !temDigitacaoAtiva()) {
            carregar();
        }
    }, 30000);
</script>
</body>
</html>

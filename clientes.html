<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM de Clientes — Letícia Marques Advocacia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }

        header {
            background: #1a1a2e; color: white; padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 20px; }
        .header-links { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .header-links a {
            color: #adb5bd; text-decoration: none; font-size: 12px;
            padding: 5px 10px; border-radius: 6px; border: 1px solid #495057;
        }
        .header-links a:hover { background: #343a40; color: white; }
        .btn-sair {
            background: none; border: 1px solid #dc3545; color: #dc3545;
            padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .btn-sair:hover { background: #dc3545; color: white; }

        main { padding: 24px; max-width: 1100px; margin: 0 auto; }

        /* ── CARDS RESUMO ── */
        .resumo { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px; margin-bottom: 24px; }
        .card-resumo {
            background: white; border-radius: 12px; padding: 16px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card-resumo .numero { font-size: 32px; font-weight: bold; color: #1a1a2e; }
        .card-resumo .label  { font-size: 12px; color: #888; margin-top: 3px; }
        .card-resumo.verde .numero  { color: #28a745; }
        .card-resumo.azul .numero   { color: #007bff; }
        .card-resumo.laranja .numero{ color: #fd7e14; }

        /* ── FILTROS ── */
        .filtros {
            background: white; border-radius: 12px; padding: 16px 20px;
            margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        }
        .filtros input[type="text"] {
            flex: 1; min-width: 200px; padding: 8px 12px;
            border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none;
        }
        .filtros input:focus { border-color: #007bff; }
        .filtros select {
            padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 13px; background: white; outline: none; cursor: pointer;
        }
        .filtros select:focus { border-color: #007bff; }
        #cnt-filtro { font-size: 12px; color: #888; white-space: nowrap; }

        /* ── TABELA ── */
        .secao {
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .tabela-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; padding: 10px 12px; text-align: left;
             color: #555; font-weight: bold; border-bottom: 2px solid #dee2e6;
             white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid #f0f2f5; color: #333; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9fa; cursor: pointer; }
        .sem-dados { text-align: center; color: #aaa; padding: 40px; font-size: 14px; }

        /* ── AVATAR ── */
        .avatar {
            width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
            background: #dee2e6; display: inline-flex; align-items: center;
            justify-content: center; font-weight: bold; color: #6c757d; font-size: 14px;
            flex-shrink: 0;
        }
        .avatar img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .cliente-info { display: flex; align-items: center; gap: 10px; }
        .cliente-nome { font-weight: bold; color: #222; }
        .cliente-tel  { font-size: 11px; color: #888; margin-top: 2px; }

        /* ── BADGES ── */
        .badge { padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .area-bpc_loas      { background: #dbeafe; color: #1e40af; }
        .area-inventario    { background: #ede9fe; color: #5b21b6; }
        .area-licitacoes    { background: #fef3c7; color: #92400e; }
        .area-fora_da_area  { background: #f3f4f6; color: #374151; }
        .area-geral         { background: #e0f2fe; color: #075985; }

        .funil-novo        { background: #f3f4f6; color: #374151; }
        .funil-qualificado { background: #dbeafe; color: #1e40af; }
        .funil-proposta    { background: #fef3c7; color: #92400e; }
        .funil-contrato    { background: #d1fae5; color: #065f46; }
        .funil-perdido     { background: #fee2e2; color: #991b1b; }

        .badge-contrato { background: #d1fae5; color: #065f46; }
        .badge-pendente { background: #fff3cd; color: #856404; }

        /* ── BOTÕES AÇÃO ── */
        .btn-acao {
            padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
            border: 1px solid; margin-right: 4px; white-space: nowrap;
        }
        .btn-hist { border-color: #007bff; color: #007bff; background: none; }
        .btn-hist:hover { background: #007bff; color: white; }
        .btn-wpp { border-color: #28a745; color: #28a745; background: none; }
        .btn-wpp:hover { background: #28a745; color: white; }

        /* ── MODAL HISTÓRICO ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white; border-radius: 14px; padding: 0;
            width: 90%; max-width: 680px; max-height: 85vh;
            display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 18px 22px; border-bottom: 1px solid #eee;
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-header h3 { font-size: 16px; color: #1a1a2e; }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 4px 8px; }
        .modal-close:hover { color: #333; }
        .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }

        .msg-item {
            margin-bottom: 16px; padding: 12px 14px;
            border-radius: 10px; background: #f8f9fa; border-left: 4px solid #dee2e6;
        }
        .msg-item.enviado { border-left-color: #28a745; }
        .msg-item.pendente { border-left-color: #ffc107; }
        .msg-item.contrato { border-left-color: #007bff; }
        .msg-topo { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: #888; }
        .msg-texto { font-size: 13px; color: #333; margin-bottom: 6px; }
        .msg-resposta { font-size: 12px; color: #28a745; font-style: italic; }
        .sem-hist { text-align: center; color: #aaa; padding: 30px; font-size: 13px; }

        /* ── NOTA NO MODAL ── */
        .nota-wrap { margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
        .nota-wrap label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 6px; display: block; }
        .nota-wrap textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 13px; font-family: Arial, sans-serif; resize: vertical; min-height: 70px; outline: none;
        }
        .nota-wrap textarea:focus { border-color: #007bff; }
        .btn-nota { margin-top: 8px; padding: 7px 18px; background: #007bff; color: white;
                    border: none; border-radius: 7px; cursor: pointer; font-size: 12px; }
        .btn-nota:hover { background: #0056b3; }
        .nota-ok { font-size: 12px; color: #28a745; margin-left: 8px; display: none; }
    </style>
</head>
<body>

<header>
    <h1>CRM de Clientes</h1>
    <div class="header-links">
        <a href="/painel">Painel</a>
        <a href="/financeiro">Financeiro</a>
        <a href="/prazos">Prazos</a>
        <a href="/relatorios">Relatórios</a>
        <a href="/configuracoes">Configurações</a>
        <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
</header>

<main>

    <!-- Resumo -->
    <div class="resumo">
        <div class="card-resumo">
            <div class="numero" id="cnt-clientes">—</div>
            <div class="label">Total de clientes</div>
        </div>
        <div class="card-resumo verde">
            <div class="numero" id="cnt-contratos">—</div>
            <div class="label">Contratos fechados</div>
        </div>
        <div class="card-resumo azul">
            <div class="numero" id="cnt-leads">—</div>
            <div class="label">Leads ativos</div>
        </div>
        <div class="card-resumo laranja">
            <div class="numero" id="cnt-recorrentes">—</div>
            <div class="label">Clientes recorrentes</div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="filtros">
        <input type="text" id="busca" placeholder="Buscar por nome ou telefone..." oninput="filtrar()">
        <select id="filtro-area" onchange="filtrar()">
            <option value="">Todas as áreas</option>
            <option value="bpc_loas">BPC LOAS</option>
            <option value="inventario">Inventário</option>
            <option value="licitacoes">Licitações</option>
            <option value="fora_da_area">Fora da área</option>
            <option value="geral">Geral</option>
        </select>
        <select id="filtro-funil" onchange="filtrar()">
            <option value="">Todos os funis</option>
            <option value="novo">Novo</option>
            <option value="qualificado">Qualificado</option>
            <option value="proposta">Proposta</option>
            <option value="contrato">Contrato</option>
            <option value="perdido">Perdido</option>
        </select>
        <span id="cnt-filtro"></span>
    </div>

    <!-- Tabela -->
    <div class="secao">
        <div class="tabela-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Área</th>
                        <th>Funil</th>
                        <th>Contatos</th>
                        <th>Último contato</th>
                        <th>Situação</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes">
                    <tr><td colspan="7" class="sem-dados">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<!-- Modal Histórico -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModal(event)">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-titulo">Histórico do cliente</h3>
            <button class="modal-close" onclick="fecharModalBtn()">✕</button>
        </div>
        <div class="modal-body">
            <div id="modal-conteudo"><div class="sem-hist">Carregando...</div></div>
            <div class="nota-wrap">
                <label>Anotações internas sobre este cliente</label>
                <textarea id="nota-texto" placeholder="Observações, pendências, detalhes importantes..."></textarea>
                <button class="btn-nota" onclick="salvarNota()">Salvar nota</button>
                <span class="nota-ok" id="nota-ok">Salvo!</span>
            </div>
        </div>
    </div>
</div>

<script>
    const API = 'https://web-production-3c5ee.up.railway.app';

    if (localStorage.getItem('painel_logado') !== '1') {
        window.location.href = '/painel';
    }
    function sair() {
        localStorage.removeItem('painel_logado');
        window.location.href = '/painel';
    }

    let todosClientes = [];
    let telefoneAtual = '';

    const AREAS = {
        bpc_loas: 'BPC LOAS', inventario: 'Inventário',
        licitacoes: 'Licitações', fora_da_area: 'Fora da Área', geral: 'Geral'
    };
    const FUNIS = {
        novo: 'Novo', qualificado: 'Qualificado',
        proposta: 'Proposta', contrato: 'Contrato', perdido: 'Perdido'
    };

    function nomeArea(a)  { return AREAS[a]  || (a||'Geral'); }
    function nomeFunil(f) { return FUNIS[f]  || (f||'Novo');  }

    function inicialNome(nome) {
        if (!nome) return '?';
        const partes = nome.trim().split(' ');
        return partes.length >= 2
            ? partes[0][0].toUpperCase() + partes[1][0].toUpperCase()
            : nome[0].toUpperCase();
    }

    function formatarData(s) {
        if (!s) return '—';
        const d = new Date(s.replace(' ', 'T'));
        return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    }

    function avatarHtml(c) {
        if (c.foto) return `<div class="avatar"><img src="${c.foto}" onerror="this.parentElement.innerHTML='${inicialNome(c.nome)}'"></div>`;
        return `<div class="avatar">${inicialNome(c.nome)}</div>`;
    }

    async function carregar() {
        try {
            const res  = await fetch(`${API}/clientes-lista`);
            todosClientes = await res.json();

            // Contadores
            const comContrato   = todosClientes.filter(c => c.contratos > 0).length;
            const leads         = todosClientes.filter(c => c.contratos === 0 && c.pendentes === 0).length;
            const recorrentes   = todosClientes.filter(c => c.total_contatos > 1).length;
            document.getElementById('cnt-clientes').textContent   = todosClientes.length;
            document.getElementById('cnt-contratos').textContent  = comContrato;
            document.getElementById('cnt-leads').textContent      = leads;
            document.getElementById('cnt-recorrentes').textContent = recorrentes;

            filtrar();
        } catch (e) {
            console.error('Erro ao carregar clientes:', e);
        }
    }

    function filtrar() {
        const busca = document.getElementById('busca').value.toLowerCase().trim();
        const area  = document.getElementById('filtro-area').value;
        const funil = document.getElementById('filtro-funil').value;

        let lista = todosClientes;
        if (busca) lista = lista.filter(c =>
            (c.nome||'').toLowerCase().includes(busca) ||
            (c.telefone||'').includes(busca));
        if (area)  lista = lista.filter(c => c.area === area);
        if (funil) lista = lista.filter(c => c.funil_status === funil);

        document.getElementById('cnt-filtro').textContent =
            lista.length === todosClientes.length
                ? `${lista.length} clientes`
                : `${lista.length} de ${todosClientes.length}`;

        const tbody = document.getElementById('tabela-clientes');
        if (lista.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="sem-dados">Nenhum cliente encontrado.</td></tr>';
            return;
        }

        tbody.innerHTML = lista.map(c => {
            const situacao = c.contratos > 0
                ? `<span class="badge badge-contrato">Contrato</span>`
                : c.pendentes > 0
                    ? `<span class="badge badge-pendente">Pendente</span>`
                    : `<span style="color:#aaa;font-size:12px">—</span>`;

            return `
            <tr onclick="abrirHistorico('${c.telefone}', '${(c.nome||'').replace(/'/g,"\\'")}')">
                <td>
                    <div class="cliente-info">
                        ${avatarHtml(c)}
                        <div>
                            <div class="cliente-nome">${c.nome || 'Desconhecido'}</div>
                            <div class="cliente-tel">${c.telefone}</div>
                        </div>
                    </div>
                </td>
                <td><span class="badge area-${c.area}">${nomeArea(c.area)}</span></td>
                <td><span class="badge funil-${c.funil_status}">${nomeFunil(c.funil_status)}</span></td>
                <td style="text-align:center"><strong>${c.total_contatos}</strong></td>
                <td style="font-size:12px;color:#666">${formatarData(c.ultimo_contato)}</td>
                <td>${situacao}</td>
                <td onclick="event.stopPropagation()">
                    <button class="btn-acao btn-hist" onclick="abrirHistorico('${c.telefone}', '${(c.nome||'').replace(/'/g,"\\'")}')">Ver histórico</button>
                    <button class="btn-acao btn-wpp" onclick="abrirWpp('${c.telefone}')">WhatsApp</button>
                </td>
            </tr>`;
        }).join('');
    }

    async function abrirHistorico(telefone, nome) {
        telefoneAtual = telefone;
        document.getElementById('modal-titulo').textContent = `Histórico — ${nome}`;
        document.getElementById('modal-conteudo').innerHTML = '<div class="sem-hist">Carregando...</div>';
        document.getElementById('nota-texto').value = '';
        document.getElementById('nota-ok').style.display = 'none';
        document.getElementById('modal-overlay').classList.add('open');

        try {
            const [resHist, resNota] = await Promise.all([
                fetch(`${API}/historico/${telefone}`),
                fetch(`${API}/nota/${telefone}`)
            ]);
            const historico = await resHist.json();
            const nota      = await resNota.json();
            document.getElementById('nota-texto').value = nota.texto || '';

            if (historico.length === 0) {
                document.getElementById('modal-conteudo').innerHTML =
                    '<div class="sem-hist">Nenhuma mensagem no histórico.</div>';
                return;
            }

            document.getElementById('modal-conteudo').innerHTML = historico.map(h => `
                <div class="msg-item ${h.status}">
                    <div class="msg-topo">
                        <span>${h.data || '—'} · ${nomeArea(h.area)} · ${(h.urgencia||'').toUpperCase()}</span>
                        <span>${h.status === 'enviado' ? '✓ Enviado' : h.status === 'contrato' ? '★ Contrato' : '⏳ Pendente'}${h.aprovado_por ? ' por ' + h.aprovado_por : ''}</span>
                    </div>
                    <div class="msg-texto">${h.mensagem || '—'}</div>
                    ${h.resposta ? `<div class="msg-resposta">↳ ${h.resposta}</div>` : ''}
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('modal-conteudo').innerHTML =
                '<div class="sem-hist">Erro ao carregar histórico.</div>';
        }
    }

    function fecharModal(e) {
        if (e.target === document.getElementById('modal-overlay'))
            document.getElementById('modal-overlay').classList.remove('open');
    }
    function fecharModalBtn() {
        document.getElementById('modal-overlay').classList.remove('open');
    }
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
    });

    async function salvarNota() {
        const texto = document.getElementById('nota-texto').value;
        try {
            await fetch(`${API}/nota/${telefoneAtual}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({texto})
            });
            const ok = document.getElementById('nota-ok');
            ok.style.display = 'inline';
            setTimeout(() => ok.style.display = 'none', 2500);
        } catch (e) { alert('Erro ao salvar nota.'); }
    }

    function abrirWpp(telefone) {
        const num = telefone.replace(/\D/g, '');
        window.open(`https://wa.me/${num}`, '_blank');
    }

    carregar();
</script>
</body>
</html>
